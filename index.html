<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VibePhone RD | Store</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --vibe-blue: #0071e3; --vibe-bg: #f5f5f7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--vibe-bg); color: #1d1d1f; margin: 0; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .product-card { background: #fff; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); overflow: hidden; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #checkout-modal, #admin-panel { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        #admin-panel { background: #fff; z-index: 3000; overflow-y: auto; display: none; flex-direction: column; justify-content: flex-start; }
        .input-vibe { background: #f5f5f7; border: 1px solid #d2d2d7; border-radius: 12px; padding: 12px; width: 100%; margin-bottom: 10px; }
        .btn-blue { background: #0071e3; color: #fff; font-weight: 700; border-radius: 12px; padding: 15px; width: 100%; }
    </style>
</head>
<body class="pb-20">

    <header class="glass-nav sticky top-0 z-[100] px-6 py-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="ps-logo" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg cursor-pointer select-none">V</div>
                <div>
                    <h1 class="text-xl font-extrabold">VibePhone RD</h1>
                    <p class="text-[9px] text-blue-600 font-bold uppercase tracking-widest">Premium Store</p>
                </div>
            </div>
            <div class="text-xs font-bold">809-818-2320</div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 mt-8">
        <div class="flex p-1 bg-gray-200 rounded-2xl mb-8">
            <button id="tab-phones" onclick="setTab('phones')" class="flex-1 py-3 rounded-xl font-bold text-xs bg-white shadow-sm">SMARTPHONES</button>
            <button id="tab-accs" onclick="setTab('accs')" class="flex-1 py-3 rounded-xl font-bold text-xs text-gray-500">ACCESORIOS</button>
        </div>
        <div id="grid-container" class="space-y-6"></div>
    </main>

    <div id="checkout-modal" onclick="if(event.target==this)closeCheckout()">
        <div class="bg-white w-full max-w-md rounded-[30px] p-8" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-black mb-4">Confirmar Pedido</h2>
            <div id="checkout-summary" class="flex gap-4 p-4 bg-blue-50 rounded-2xl mb-4"></div>
            <form onsubmit="sendOrder(event)">
                <input type="text" id="c-name" placeholder="Nombre completo" required class="input-vibe">
                <input type="tel" id="c-phone" placeholder="WhatsApp" required class="input-vibe">
                <input type="email" id="c-email" placeholder="Correo para el recibo" required class="input-vibe">
                <textarea id="c-address" placeholder="Dirección de envío" required class="input-vibe h-20"></textarea>
                <div class="flex justify-between text-xl font-black py-4"><span>Total:</span><span id="c-total" class="text-blue-600">RD$ 0</span></div>
                <button type="submit" class="btn-blue shadow-lg shadow-blue-200">Confirmar Compra</button>
            </form>
        </div>
    </div>

    <div id="admin-panel">
        <div class="max-w-md w-full p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Panel Admin</h2>
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="text-red-500 font-bold">CERRAR</button>
            </div>
            <select id="a-cat" class="input-vibe"><option value="phones">SMARTPHONES</option><option value="accs">ACCESORIOS</option></select>
            <input type="text" id="a-name" placeholder="Modelo" class="input-vibe">
            <input type="number" id="a-price" placeholder="Precio RD$" class="input-vibe">
            <input type="text" id="a-url" placeholder="URL de la imagen" class="input-vibe">
            <textarea id="a-desc" placeholder="Descripción" class="input-vibe h-20"></textarea>
            <button onclick="saveItem()" class="btn-blue">PUBLICAR EQUIPO</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN DE FIREBASE (Datos de tu captura)
        const firebaseConfig = {
          apiKey: "AIzaSyCe8mDvPK1QreLXcxIbsOg0dXk6iahZyPc",
          authDomain: "mi-tienda-8828a.firebaseapp.com",
          projectId: "mi-tienda-8828a",
          storageBucket: "mi-tienda-8828a.firebasestorage.app",
          messagingSenderId: "924030830493",
          appId: "1:924030830493:web:ae4f2498698056b0521174",
          measurementId: "G-Y5MFCGCEQB"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        emailjs.init("YFdmH2dv7ubtkJzod");

        let currentTab = 'phones';
        let selectedProduct = null;
        let clicks = 0;

        // ACCESO 5 CLICS
        document.getElementById('ps-logo').onclick = () => {
            clicks++;
            if(clicks === 5) {
                if(prompt("PASSWORD:") === "Avd121094") document.getElementById('admin-panel').style.display='flex';
                clicks = 0;
            }
            setTimeout(() => clicks = 0, 3000);
        };

        async function saveItem() {
            const btn = event.target;
            btn.innerText = "Subiendo...";
            try {
                await db.collection("productos").add({
                    n: document.getElementById('a-name').value,
                    p: document.getElementById('a-price').value,
                    d: document.getElementById('a-desc').value,
                    url: document.getElementById('a-url').value,
                    cat: document.getElementById('a-cat').value,
                    fecha: Date.now()
                });
                alert("¡Publicado!");
                location.reload();
            } catch (e) { alert("Error: " + e); }
        }

        function render() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '<p class="text-center py-10 text-blue-600">Cargando...</p>';
            
            db.collection("productos").where("cat", "==", currentTab).orderBy("fecha", "desc").get().then((qs) => {
                container.innerHTML = "";
                qs.forEach((doc) => {
                    const item = doc.data();
                    container.innerHTML += `
                        <div class="product-card">
                            <img src="${item.url}" class="w-full h-64 object-cover">
                            <div class="p-6">
                                <h3 class="text-xl font-bold">${item.n}</h3>
                                <p class="text-gray-500 text-xs mb-4">${item.d}</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-xl font-black text-blue-600">RD$ ${Number(item.p).toLocaleString()}</span>
                                    <button onclick="openCheckout('${doc.id}', '${item.n}', '${item.p}', '${item.url}')" class="bg-black text-white px-5 py-2 rounded-full text-xs font-bold">Comprar</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function openCheckout(id, name, price, img) {
            selectedProduct = { id, n: name, p: price, img: img };
            document.getElementById('checkout-summary').innerHTML = `<img src="${img}" class="w-16 h-16 rounded-xl object-cover"><div><p class="font-bold">${name}</p><p class="text-blue-600 font-bold">RD$ ${Number(price).toLocaleString()}</p></div>`;
            document.getElementById('c-total').innerText = `RD$ ${Number(price).toLocaleString()}`;
            document.getElementById('checkout-modal').style.display = 'flex';
        }

        function closeCheckout() { document.getElementById('checkout-modal').style.display = 'none'; }

        function sendOrder(e) {
            e.preventDefault();
            const params = {
                order_id: selectedProduct.id,
                name: document.getElementById('c-name').value,
                phone: document.getElementById('c-phone').value,
                email: document.getElementById('c-email').value,
                address: document.getElementById('c-address').value,
                product_name: selectedProduct.n,
                price: selectedProduct.p,
                total_order: selectedProduct.p,
                image_url: selectedProduct.img
            };

            emailjs.send('Avd121094', 'template_6h1zxd9', params).then(() => {
                const wa = `https://wa.me/8098182320?text=Pedido:%20${params.product_name}%20RD$%20${params.price}%20Cliente:%20${params.name}`;
                window.location.href = wa;
            });
        }

        function setTab(t) {
            currentTab = t;
            document.getElementById('tab-phones').className = `flex-1 py-3 rounded-xl font-bold text-xs ${t==='phones'?'bg-white shadow-sm':'text-gray-500'}`;
            document.getElementById('tab-accs').className = `flex-1 py-3 rounded-xl font-bold text-xs ${t==='accs'?'bg-white shadow-sm':'text-gray-500'}`;
            render();
        }

        render();
    </script>
</body>
</html>
